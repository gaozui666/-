<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>蛋仔派对原价代充 - 统一+2元手续费</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fa;font-family:微软雅黑;}
        .container{max-width:420px;margin:20px auto;background:#fff;border-radius:12px;padding:20px;}
        h1{text-align:center;color:#ff6799;margin-bottom:10px;font-size:24px;}
        .desc{text-align:center;color:#999;margin-bottom:20px;font-size:14px;}
        .item{background:#fef0f5;padding:15px;border-radius:8px;margin:10px 0;display:flex;justify-content:space-between;}
        .wx{text-align:center;margin-top:30px;}
        .wx img{width:200px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .tip{margin-top:20px;color:#666;font-size:14px;line-height:1.8;}

</head>
<body>
    <div class="container">

        </div>
        <div class="item">
            <span>30元档 300蛋币</span>

        </div>
        <div class="item">

        </div>
        <div class="item">
            <span>128元档 1280蛋币</span>

        </div>
        <div class="item">
            <span>328元档 典藏礼包</span>

            1. 全部官方原价，每单仅收2元人工手续费<br>
            2. 充值请提供：游戏账号 + 区服信息<br>

</body>
</html>
