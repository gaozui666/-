<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>毒蘑菇性能测试</title>
<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:Arial}
#info{position:fixed;top:10px;left:10px;font-size:18px}
button{position:fixed;top:10px;right:10px;padding:10px 15px;border:none;border-radius:6px;background:#22c55e;color:white;cursor:pointer}
</style>
</head>
<body>
<div id="info">点击开始</div>
<button onclick="start()">开始</button>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let t=0;
let running=false;
let fps=0,frames=0,last=0;

function start(){
  running=true;
  last=performance.now();
  loop(last);
}

function loop(time){
  if(!running)return;
  frames++;

  if(time-last>=1000){
    fps=frames;
    document.getElementById('info').textContent=`FPS: ${fps}`;
    frames=0;
    last=time;
  }

  draw();
  requestAnimationFrame(loop);
}

function draw(){
  t+=0.05;

  const imgData=ctx.createImageData(canvas.width,canvas.height);
  const data=imgData.data;

  for(let i=0;i<data.length;i+=4){
    let x=(i/4)%canvas.width;
    let y=Math.floor((i/4)/canvas.width);

    let v=Math.sin(x*0.02+t)+Math.cos(y*0.02+t);

    let r=(Math.sin(v+t)*127+128);
    let g=(Math.cos(v+t*1.3)*127+128);
    let b=(Math.sin(v*2+t)*127+128);

    data[i]=r;
    data[i+1]=g;
    data[i+2]=b;
    data[i+3]=255;
  }

  ctx.putImageData(imgData,0,0);
}
</script>
</body>
</html>
