<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>毒蘑菇GPU测试</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;text-align:center}
#top{padding:10px}
select,button{padding:8px;margin:5px;border-radius:6px;border:none}
canvas{display:block;margin:auto;background:black}
</style>
</head>
<body>

<div id="top">
  <select id="preset">
    <option value="0.5">超低</option>
    <option value="0.75">低</option>
    <option value="1" selected>中</option>
    <option value="1.5">高</option>
    <option value="2">极限</option>
  </select>
  <button onclick="start()">开始测试</button>
  <button onclick="stop()">停止</button>
  <div id="info">FPS: 0</div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let scale = 1;
let running = false;
let frames = 0;
let last = 0;
let fps = 0;
let t = 0;

function resize() {
  canvas.width = window.innerWidth * scale;
  canvas.height = window.innerHeight * scale;
}
window.onresize = resize;

function start() {
  scale = parseFloat(document.getElementById("preset").value);
  resize();
  running = true;
  last = performance.now();
  loop(last);
}

function stop() {
  running = false;
}

function loop(time) {
  if (!running) return;

  frames++;
  if (time - last >= 1000) {
    fps = frames;
    document.getElementById("info").innerText =
      `FPS: ${fps} | 分辨率: ${canvas.width}x${canvas.height}`;
    frames = 0;
    last = time;
  }

  render();
  requestAnimationFrame(loop);
}

function render() {
  t += 0.04;

  let w = canvas.width;
  let h = canvas.height;

  let img = ctx.createImageData(w, h);
  let d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    let x = (i / 4) % w;
    let y = Math.floor(i / 4 / w);

    let nx = x / w - 0.5;
    let ny = y / h - 0.5;

    let v = Math.sin(nx * 10 + t) + Math.cos(ny * 10 + t);

    let r = Math.sin(v + t) * 127 + 128;
    let g = Math.cos(v + t * 1.3) * 127 + 128;
    let b = Math.sin(v * 2 + t) * 127 + 128;

    d[i] = r;
    d[i + 1] = g;
    d[i + 2] = b;
    d[i + 3] = 255;
  }

  ctx.putImageData(img, 0, 0);
}
</script>

</body>
</html>
