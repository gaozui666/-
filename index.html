<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>浏览器性能测试（可调强度）</title>
  <style>
    body { font-family: Arial; text-align: center; background: #0f172a; color: white; margin: 0; }
    h1 { margin-top: 24px; }
    #panel { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 10px 0 6px; }
    #stats { font-size: 18px; margin: 8px; }
    button { padding: 10px 18px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; background: #22c55e; color: white; }
    input[type=range] { width: 260px; }
    canvas { display: block; margin: 10px auto 20px; background: black; border-radius: 10px; }
    .label { opacity: .85; }
  </style>
</head>
<body>

<h1>⚡ 浏览器性能测试（强度可调）</h1>

<div id="panel">
  <span class="label">粒子数：</span>
  <input id="range" type="range" min="500" max="20000" step="500" value="2000">
  <span id="rangeVal">2000</span>
  <button id="startBtn">开始</button>
  <button id="stopBtn">停止</button>
  <button id="applyBtn">应用强度</button>
</div>

<div id="stats">未开始</div>
<canvas id="canvas" width="900" height="520"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const range = document.getElementById('range');
const rangeVal = document.getElementById('rangeVal');
const stats = document.getElementById('stats');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const applyBtn = document.getElementById('applyBtn');

range.addEventListener('input', () => rangeVal.textContent = range.value);

let particles = [];
let running = false;
let frames = 0;
let lastTime = 0;
let lastFps = 0;

function createParticles(count) {
  particles = new Array(count).fill(0).map(() => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 4,
    vy: (Math.random() - 0.5) * 4
  }));
}

function update() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  }
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ffff";
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.fillRect(p.x, p.y, 3, 3);
  }
}

function loop(ts) {
  if (!running) return;
  frames++;

  if (ts - lastTime >= 1000) {
    lastFps = frames;
    stats.textContent = `FPS: ${lastFps} | 粒子数: ${particles.length}`;
    frames = 0;
    lastTime = ts;
  }

  update();
  draw();
  requestAnimationFrame(loop);
}

startBtn.onclick = () => {
  if (!running) {
    running = true;
    createParticles(parseInt(range.value, 10));
    lastTime = performance.now();
    frames = 0;
    loop(lastTime);
  }
};

stopBtn.onclick = () => {
  running = false;
  stats.textContent = `已停止 | 上次FPS: ${lastFps} | 粒子数: ${particles.length}`;
};

applyBtn.onclick = () => {
  createParticles(parseInt(range.value, 10));
  stats.textContent = `已应用新强度：${particles.length}`;
};

// 自适应屏幕（可选）
window.addEventListener('resize', () => {
  canvas.width = Math.min(window.innerWidth - 20, 1200);
  canvas.height = Math.min(window.innerHeight - 180, 700);
});
</script>

</body>
</html>
